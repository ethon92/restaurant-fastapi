<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>餐廳詳情</title>
    <style>
        :root {
            --primary-color: #ff6b6b;
            --primary-dark: #e05555;
            --bg-color: #f8f9fa;
            --text-color: #333;
        }
        body { 
            font-family: "Helvetica Neue", Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background-color: var(--bg-color); 
            color: var(--text-color);
        }
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
        }
        .back-btn { 
            display: inline-flex;
            align-items: center;
            margin-bottom: 20px; 
            text-decoration: none; 
            color: #666; 
            font-weight: bold;
            transition: 0.2s;
        }
        .back-btn:hover { color: var(--primary-color); }
        
        /* 餐廳資訊區 */
        .header { 
            border-bottom: 1px solid #eee; 
            padding-bottom: 25px; 
            margin-bottom: 25px; 
        }
        .title-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        .res-name { 
            font-size: 32px; 
            color: #333; 
            margin: 0; 
        }
        .price-badge {
            font-size: 1.2rem;
            color: #e67e22; /* 橘色 */
            font-weight: bold;
            background: #fff5e6;
            padding: 2px 8px;
            border-radius: 6px;
        }

        .tags-container { margin: 10px 0 15px 0; }
        .tag {
            display: inline-block;
            background: #eee;
            color: #555;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.85rem;
            margin-right: 5px;
        }

        .res-info { color: #555; font-size: 15px; line-height: 1.8; }
        .info-item { display: flex; align-items: center; gap: 8px; }

        /* 相簿區 */
        .gallery-title { margin-top: 30px; font-size: 1.2rem; border-left: 4px solid var(--primary-color); padding-left: 10px; }
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 15px; 
            margin-bottom: 40px; 
        }
        .gallery img { 
            width: 100%; 
            height: 180px; 
            object-fit: cover; 
            border-radius: 8px; 
            background: #f0f0f0;
            transition: transform 0.2s;
        }
        .gallery img:hover { transform: scale(1.02); }

        /* 預約表單區 */
        .booking-box { 
            background: #fff9f9; 
            padding: 30px; 
            border-radius: 12px; 
            border: 1px solid #ffecec; 
        }
        .booking-title { margin-top: 0; color: var(--primary-color); text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        .form-control { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px;
            outline: none;
            transition: 0.2s;
        }
        .form-control:focus { border-color: var(--primary-color); }
        
        .submit-btn { 
            width: 100%; 
            padding: 14px; 
            background-color: var(--primary-color); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer; 
            margin-top: 10px; 
            transition: 0.2s;
        }
        .submit-btn:hover { background-color: var(--primary-dark); transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← 回到餐廳列表</a>
        
        <div class="header">
            <div class="title-row">
                <h1 class="res-name" id="name">載入中...</h1>
                <span class="price-badge" id="priceLevel"></span>
            </div>
            
            <div class="tags-container" id="tagsBox">
                </div>

            <div class="res-info">
                <div class="info-item">📍 地址：<span id="address"></span></div>
                <div class="info-item">📞 電話：<span id="tel"></span></div>
            </div>
            <p id="desc" style="color:#666; margin-top:15px; line-height:1.6;"></p>
        </div>

        <h3 class="gallery-title">📸 環境照片</h3>
        <div class="gallery" id="gallery-grid">
            <p style="color:#999; padding:10px;">照片載入中...</p>
        </div>

        <div class="booking-box">
            <h2 class="booking-title">📅 我要訂位</h2>
            <form onsubmit="submitBooking(event)">
                <div class="form-group">
                    <label>您的姓名</label>
                    <input type="text" id="user_name" class="form-control" required placeholder="請輸入姓名">
                </div>
                <div class="form-group">
                    <label>聯絡電話</label>
                    <input type="tel" id="user_phone" class="form-control" required placeholder="09xx-xxx-xxx">
                </div>
                <div style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex:1;">
                        <label>日期</label>
                        <input type="date" id="book_date" class="form-control" required>
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label>時間</label>
                        <input type="time" id="book_time" class="form-control" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>用餐人數</label>
                    <input type="number" id="book_people" class="form-control" min="1" value="2" required>
                </div>
                <button type="submit" class="submit-btn">確認預約</button>
            </form>
        </div>
    </div>

    <script>
        // 設定日期輸入框的預設值為今天
        document.getElementById('book_date').valueAsDate = new Date();
        document.getElementById('book_time').value = "18:30"; // 預設晚上六點半

        // 1. 從網址取得餐廳名稱 (?name=xxx)
        const params = new URLSearchParams(window.location.search);
        const restaurantName = params.get('name');

        if (!restaurantName) {
            alert("網址錯誤：沒有指定餐廳名稱");
            window.location.href = 'index.html';
        }

        // 2. 載入餐廳詳細資料
        async function loadDetail() {
            try {
                // 加上時間戳記防止快取
                const timestamp = new Date().getTime();
                const res = await fetch(`/api/restaurant/${encodeURIComponent(restaurantName)}?t=${timestamp}`);
                
                if (!res.ok) throw new Error("找不到餐廳資料");
                
                const data = await res.json();
                const info = data.info; // 這是 main_data 裡的物件
                const gallery = data.gallery;

                // --- 填入基本資料 ---
                document.title = `${info.Name} - 訂位`;
                document.getElementById('name').innerText = info.Name;
                document.getElementById('address').innerText = info.Add || "暫無地址資料";
                document.getElementById('tel').innerText = info.Tel || "暫無電話";
                document.getElementById('desc').innerText = info.Description || "這家餐廳暫時沒有介紹...";
                
                // --- 填入價格等級 ($, $$, $$$) ---
                const price = info.PriceLevel || '$';
                document.getElementById('priceLevel').innerText = price;

                // --- 填入標籤 (Tags) ---
                const tagsBox = document.getElementById('tagsBox');
                tagsBox.innerHTML = '';
                if (info.TagsStr) {
                    const tags = info.TagsStr.split(',');
                    tags.forEach(tag => {
                        const span = document.createElement('span');
                        span.className = 'tag';
                        span.innerText = tag.trim();
                        tagsBox.appendChild(span);
                    });
                }

                // --- 填入相簿 (含路徑修復邏輯) ---
                const galleryDiv = document.getElementById('gallery-grid');
                galleryDiv.innerHTML = '';
                
                // 1. 整理圖片清單 (如果有 gallery 就用，沒有就用封面圖)
                let imagesToShow = [];
                if (gallery && gallery.length > 0) {
                    imagesToShow = gallery;
                } else if (info.CoverImage) {
                    imagesToShow = [info.CoverImage];
                }

                if (imagesToShow.length > 0) {
                    imagesToShow.forEach(imgUrl => {
                        // 路徑修復：確保有 /static 前綴
                        let safeUrl = imgUrl;
                        if (safeUrl && !safeUrl.startswith && !safeUrl.startsWith('/static') && !safeUrl.startsWith('http')) {
                            safeUrl = '/static' + safeUrl;
                        }

                        const img = document.createElement('img');
                        img.src = safeUrl;
                        img.loading = "lazy";
                        img.onerror = function() { this.style.display='none'; }; 
                        galleryDiv.appendChild(img);
                    });
                } else {
                    galleryDiv.innerHTML = '<p style="color:#999;">這家餐廳暫時沒有照片</p>';
                }

            } catch (err) {
                console.error(err);
                // alert("讀取失敗：" + err.message); 
                // 選擇不跳 alert 干擾體驗，但在 console 報錯
            }
        }

        // 3. 送出預約功能
        async function submitBooking(e) {
            e.preventDefault(); 
            
            const bookingData = {
                restaurant_name: restaurantName,
                user_name: document.getElementById('user_name').value,
                phone: document.getElementById('user_phone').value,
                date: document.getElementById('book_date').value,
                time: document.getElementById('book_time').value,
                people: parseInt(document.getElementById('book_people').value)
            };

            try {
                const res = await fetch('/api/book', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bookingData)
                });
                
                const result = await res.json();
                if (result.status === 'success') {
                    alert(`✅ 預約成功！\n\n餐廳：${restaurantName}\n時間：${bookingData.date} ${bookingData.time}`);
                    window.location.href = 'index.html'; 
                } else {
                    alert('預約失敗，請稍後再試');
                }
            } catch (err) {
                console.error(err);
                alert('連線錯誤');
            }
        }

        loadDetail();
    </script>
</body>
</html>
